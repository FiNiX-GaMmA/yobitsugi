name: Release & Publish

# Release policy: EVERY push to main is a release.
#
# - prep    finds the latest vX.Y.Z tag, computes the next patch (vX.Y.{Z+1}).
# - tag     creates and pushes that tag.
# - build   uses hatch-vcs to read the new tag → wheel/sdist metadata version.
# - release creates the GitHub Release with the artifacts attached.
# - publish uploads to PyPI.
#
# A direct `v*` tag push or a `release: published` event also runs the downstream jobs.
# `workflow_dispatch` behaves like a main push.

on:
  push:
    branches: [main]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

# Opt JS actions onto Node 24 ahead of the June 2026 forced cutover.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ------------------------------------------------------------------------
  # 1. Decide what (if anything) this run should release.
  # ------------------------------------------------------------------------
  prep:
    name: Compute release plan
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
      needs_tag: ${{ steps.decide.outputs.needs_tag }}
      version: ${{ steps.decide.outputs.version }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: decide
        shell: bash
        run: |
          set -euo pipefail

          # Find the latest existing vX.Y.Z tag. Falls back to v0.0.0 if there are none.
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          latest="${latest:-v0.0.0}"
          echo "Latest existing tag: $latest"

          # Strip the leading v, split into MAJOR/MINOR/PATCH.
          IFS='.' read -r major minor patch <<< "${latest#v}"
          next_patch=$((patch + 1))
          computed_tag="v${major}.${minor}.${next_patch}"
          computed_version="${major}.${minor}.${next_patch}"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Direct tag push: use the tag verbatim, don't try to re-tag.
            tag="${GITHUB_REF#refs/tags/}"
            version="${tag#v}"
            echo "Direct tag push: $tag"
            echo "release=true"    >> "$GITHUB_OUTPUT"
            echo "needs_tag=false" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=$tag"        >> "$GITHUB_OUTPUT"
          else
            # Main push, release: published, or workflow_dispatch → auto-bump patch.
            echo "Auto-bumping: $latest → $computed_tag"
            echo "release=true"    >> "$GITHUB_OUTPUT"
            echo "needs_tag=true"  >> "$GITHUB_OUTPUT"
            echo "version=$computed_version" >> "$GITHUB_OUTPUT"
            echo "tag=$computed_tag"         >> "$GITHUB_OUTPUT"
          fi

  # ------------------------------------------------------------------------
  # 2. If pyproject.toml's version is new, create + push the matching tag.
  # ------------------------------------------------------------------------
  tag:
    name: Create git tag
    needs: prep
    if: needs.prep.outputs.needs_tag == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Create + push tag
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prep.outputs.tag }}" -m "Release ${{ needs.prep.outputs.tag }}"
          git push origin "${{ needs.prep.outputs.tag }}"

  # ------------------------------------------------------------------------
  # 3. Build sdist + wheel. Used by both `release` and `publish` jobs.
  # ------------------------------------------------------------------------
  build:
    name: Build sdist + wheel
    needs: [prep, tag]
    if: |
      always() &&
      needs.prep.outputs.release == 'true' &&
      (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Always build from the tagged commit so the artifact metadata matches the tag.
          ref: ${{ needs.prep.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build
        run: python -m build

      - name: Verify distributions
        run: twine check --strict dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14

  # ------------------------------------------------------------------------
  # 4. Create a GitHub Release with the artifacts attached.
  #    Skipped on the `release: published` trigger (release already exists).
  # ------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [prep, build]
    if: needs.prep.outputs.release == 'true' && github.event_name != 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prep.outputs.tag }}

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          version="${{ needs.prep.outputs.version }}"
          if grep -q "^## ${version}" CHANGELOG.md; then
            awk -v v="^## ${version}" '
              $0 ~ v {flag=1; next}
              flag && /^## / {exit}
              flag {print}
            ' CHANGELOG.md > release_notes.md
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "No matching CHANGELOG section for ${version} — auto-generating notes." > release_notes.md
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prep.outputs.tag }}
          name: ${{ needs.prep.outputs.tag }}
          body_path: release_notes.md
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}
          draft: false
          prerelease: ${{ contains(needs.prep.outputs.tag, '-rc') || contains(needs.prep.outputs.tag, '-alpha') || contains(needs.prep.outputs.tag, '-beta') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true

  # ------------------------------------------------------------------------
  # 5. Upload the same artifacts to PyPI. Gated behind the `pypi` environment.
  # ------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [prep, build]
    if: needs.prep.outputs.release == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/yobitsugi
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist/
          verify-metadata: true
          skip-existing: false
          print-hash: true
