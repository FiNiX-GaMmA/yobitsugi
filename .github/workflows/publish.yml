name: Release & Publish

# Release policy
# ──────────────
# • A direct `v*` tag push          → publishes that exact version. One release.
# • A push to `main` whose HEAD     → no-op. The tag-push already shipped this commit;
#   already has a `v*` tag            the workflow refuses to double-release the same
#                                     code under a bumped patch number.
# • A push to `main` without a tag  → auto-bumps the latest `vX.Y.Z` tag's patch
#   on HEAD                           component, creates that tag, releases it.
# • `release: published`            → builds artifacts again from the tag and uploads
#                                     (idempotent — PyPI skip-existing is on).
# • `workflow_dispatch`             → behaves like a `main` push.
#
# Job graph (worker nodes run in parallel where the graph branches):
#
#     prep ──► tag ──┬─► build-wheel ──┐
#                    │                  ├─► release   (parallel with publish)
#                    └─► build-sdist ──┤
#                       (parallel)     └─► publish    (parallel with release)
#
# `tag` is skipped on direct tag pushes (the tag already exists).
# `build-wheel` and `build-sdist` run on separate ubuntu-latest runners
# concurrently, then `release` and `publish` each pull both artifacts.

on:
  push:
    branches: [main]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

# Opt JS actions onto Node 24 ahead of the June 2026 forced cutover.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Cancel an in-flight run if a newer push lands on the same ref. Avoids two
# overlapping releases racing each other to PyPI.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Decide what (if anything) this run should release.
  # ──────────────────────────────────────────────────────────────────────────
  prep:
    name: Compute release plan
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
      needs_tag: ${{ steps.decide.outputs.needs_tag }}
      version: ${{ steps.decide.outputs.version }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: decide
        shell: bash
        run: |
          set -euo pipefail

          # Find the latest existing vX.Y.Z tag. Falls back to v0.0.0 if there are none.
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          latest="${latest:-v0.0.0}"
          echo "Latest existing tag: $latest"

          # Strip the leading v, split into MAJOR/MINOR/PATCH.
          IFS='.' read -r major minor patch <<< "${latest#v}"
          next_patch=$((patch + 1))
          computed_tag="v${major}.${minor}.${next_patch}"
          computed_version="${major}.${minor}.${next_patch}"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Direct tag push: use the tag verbatim, don't try to re-tag.
            tag="${GITHUB_REF#refs/tags/}"
            version="${tag#v}"
            echo "Direct tag push: $tag"
            echo "release=true"    >> "$GITHUB_OUTPUT"
            echo "needs_tag=false" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=$tag"        >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Foot-gun guard: if HEAD already carries a `v*` tag, a previous
          # tag-push has already shipped this commit. Don't auto-bump on top
          # of it — that would publish the same code under a second version
          # number (e.g. someone pushes `v1.0.0` then `main` and PyPI gets
          # both `1.0.0` and `1.0.1` with identical wheels).
          head_tag=$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' | head -n 1)
          if [[ -n "$head_tag" ]]; then
            echo "HEAD already has tag $head_tag — skipping auto-bump release."
            echo "release=false"   >> "$GITHUB_OUTPUT"
            echo "needs_tag=false" >> "$GITHUB_OUTPUT"
            echo "version=${head_tag#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$head_tag"   >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Default path: main push (or workflow_dispatch / release event)
          # with no existing tag on HEAD → auto-bump patch.
          echo "Auto-bumping: $latest → $computed_tag"
          echo "release=true"    >> "$GITHUB_OUTPUT"
          echo "needs_tag=true"  >> "$GITHUB_OUTPUT"
          echo "version=$computed_version" >> "$GITHUB_OUTPUT"
          echo "tag=$computed_tag"         >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Create the auto-bumped tag (only when prep said `needs_tag=true`).
  # ──────────────────────────────────────────────────────────────────────────
  tag:
    name: Create git tag
    needs: prep
    if: needs.prep.outputs.needs_tag == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Create + push tag
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prep.outputs.tag }}" -m "Release ${{ needs.prep.outputs.tag }}"
          git push origin "${{ needs.prep.outputs.tag }}"

  # ──────────────────────────────────────────────────────────────────────────
  # 3a. Build the wheel on its own worker, in parallel with the sdist build.
  # ──────────────────────────────────────────────────────────────────────────
  build-wheel:
    name: Build wheel
    needs: [prep, tag]
    if: |
      always() &&
      needs.prep.outputs.release == 'true' &&
      (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prep.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify wheel
        run: twine check --strict dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # 3b. Build the sdist on a separate worker, in parallel with the wheel build.
  # ──────────────────────────────────────────────────────────────────────────
  build-sdist:
    name: Build sdist
    needs: [prep, tag]
    if: |
      always() &&
      needs.prep.outputs.release == 'true' &&
      (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prep.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist
        run: python -m build --sdist

      - name: Verify sdist
        run: twine check --strict dist/*.tar.gz

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Create the GitHub Release.
  #    Runs in parallel with `publish` (both fan out from the build jobs).
  #    Skipped on the `release: published` trigger (release already exists).
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [prep, build-wheel, build-sdist]
    if: needs.prep.outputs.release == 'true' && github.event_name != 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prep.outputs.tag }}

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-wheel
          path: dist/

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-sdist
          path: dist/

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          version="${{ needs.prep.outputs.version }}"
          if grep -q "^## ${version}" CHANGELOG.md; then
            awk -v v="^## ${version}" '
              $0 ~ v {flag=1; next}
              flag && /^## / {exit}
              flag {print}
            ' CHANGELOG.md > release_notes.md
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "No matching CHANGELOG section for ${version} — auto-generating notes." > release_notes.md
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prep.outputs.tag }}
          name: ${{ needs.prep.outputs.tag }}
          body_path: release_notes.md
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}
          draft: false
          prerelease: ${{ contains(needs.prep.outputs.tag, '-rc') || contains(needs.prep.outputs.tag, '-alpha') || contains(needs.prep.outputs.tag, '-beta') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Upload to PyPI. Runs in parallel with `release`. Gated by the
  #    `pypi` environment (set PYPI_TOKEN in the env's secrets).
  # ──────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [prep, build-wheel, build-sdist]
    if: needs.prep.outputs.release == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/yobitsugi
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-wheel
          path: dist/

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist/
          verify-metadata: true
          # skip-existing on: if the same version was already pushed (e.g. on a
          # re-run after a transient PyPI 5xx), don't fail the workflow.
          skip-existing: true
          print-hash: true
