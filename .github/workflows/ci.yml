name: CI

# Each check runs on its own worker node so they execute in parallel rather
# than back-to-back. Linting and type-checking are Python-version-independent
# (they only need one runner), but the test suite is matrixed across 3.11 /
# 3.12 / 3.13 since real users hit it on all three.
#
# Job graph (every job below is a fan-out from the trigger — none of them
# depend on each other, all run concurrently):
#
#     trigger ─┬─► lint        (1 worker)
#              ├─► typecheck   (1 worker)
#              ├─► tests-3.11  ┐
#              ├─► tests-3.12  ├ (3 workers, matrix)
#              ├─► tests-3.13  ┘
#              ├─► smoke-3.11  ┐
#              ├─► smoke-3.12  ├ (3 workers, matrix)
#              └─► smoke-3.13  ┘

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt JS actions onto Node 24 ahead of the June 2026 forced cutover.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Cancel older runs on the same branch when a newer commit lands. Saves CI
# minutes when you push twice in a row.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint (ruff) — Python-version-independent. One runner, not three.
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: ruff check
        run: ruff check yobitsugi

  # ──────────────────────────────────────────────────────────────────────────
  # Type check (mypy) — also Python-version-independent. One runner.
  # ──────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    # mypy used to be advisory (continue-on-error). The codebase is now clean
    # under `mypy yobitsugi --ignore-missing-imports`, so a regression here
    # gates the merge. types-PyYAML and types-requests come in via the dev
    # extras so the bare `import yaml` / `import requests` don't need
    # `# type: ignore` comments any more.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: mypy
        run: mypy yobitsugi --ignore-missing-imports

  # ──────────────────────────────────────────────────────────────────────────
  # Test suite — actually depends on Python version, so matrixed across 3.
  # Each matrix slot is its own worker node.
  # ──────────────────────────────────────────────────────────────────────────
  tests:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        run: |
          if [ -d tests ] && [ -n "$(ls tests/*.py 2>/dev/null)" ]; then
            pytest -v
          else
            echo "No tests yet — skipping."
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # Smoke test the CLI — also matrixed since import-time / entrypoint issues
  # do sometimes vary by Python version. Separate from `tests` so a unit-test
  # failure doesn't mask a packaging regression.
  # ──────────────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: yobitsugi version
        run: yobitsugi version

      - name: yobitsugi list-platforms
        run: yobitsugi list-platforms

      - name: yobitsugi list-scanners
        run: yobitsugi list-scanners
